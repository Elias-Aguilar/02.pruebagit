<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    height:100vh;
    background:#f4f6f9;
}

.login-container{
    height:100vh;
}

.login-box{
    max-width:400px;
    width:100%;
}

company-title{
    font-size:28px;
    font-weight:600;
    margin-bottom:30px;
}

</style>

</head>
<body>

<div class="container-fluid">
<div class="row login-container">

<!-- LOGIN -->
<div class="col-md-5 d-flex align-items-center justify-content-center">

    <div class="login-box">

        <div class="company-title text-center">
            Sistema de Acceso
        </div>

        <form>

            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" class="form-control" placeholder="Ingrese su usuario">
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" placeholder="Ingrese su contraseña">
            </div>

            <div class="d-grid mb-3">
                <button class="btn btn-primary">
                    Iniciar sesión
                </button>
            </div>

            <div class="text-center">
                <a href="#" data-bs-toggle="modal" data-bs-target="#recoverModal">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

        </form>

    </div>

</div>


<!-- IMAGEN -->
<div class="col-md-7 d-none d-md-block image-side"></div>

</div>
</div>


<!-- Modal recuperar contraseña -->
<div class="modal fade" id="recoverModal">

<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Recuperar contraseña</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<p>Ingrese su correo electrónico.</p>

<div class="mb-3">
<label class="form-label">Correo</label>
<input type="email" class="form-control">
</div>

</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
<button class="btn btn-primary">Enviar</button>
</div>

</div>
</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
