<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de Usuario</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container-fluid vh-100">
        <div class="row h-100">

            <!-- Columna izquierda con imagen -->
            <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-white">
                <img 
                    src="images/main.jpg" 
                    alt="Imagen representativa" 
                    class="img-fluid">
            </div>

            <!-- Columna derecha con login -->
            <div class="col-md-6 d-flex align-items-center justify-content-center">
                <div class="card shadow-sm p-4" style="max-width: 350px; width: 100%;">
                    <h3 class="text-center mb-4">Iniciar Sesión</h3>

                    <form action="/login" method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">Nombre de usuario</label>
                            <input 
                                type="text" 
                                id="username" 
                                name="username" 
                                class="form-control" 
                                required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="form-control" 
                                required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            Ingresar
                        </button>

                        <div class="text-center">
                            <a href="/reset-password" class="text-decoration-none">
                                ¿Olvidaste tu contraseña?
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    </script>
</body>
</html>
